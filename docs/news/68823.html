<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>РЕСПУБЛИКИ УЗБЕКИСТАН ПО СТАТИСТИКЕ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.wrap{max-width:720px;margin:0 auto;padding:20px 16px 48px}
.back{display:inline-flex;align-items:center;gap:6px;color:#b5451b;font-size:14px;font-weight:600;text-decoration:none;margin-bottom:16px;}
.card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 20px rgba(0,0,0,.07)}
.header{background:#b5451b;padding:22px 24px 20px;}
.cat-badge{display:inline-block;background:rgba(255,255,255,.2);color:#fff;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;letter-spacing:.4px;margin-bottom:10px}
.headline{color:#fff;font-size:20px;font-weight:700;line-height:1.35}
.period{color:rgba(255,255,255,.7);font-size:13px;margin-top:6px}
.body{padding:24px 24px 28px}
.main-stat{background:#b5451b12;border-radius:12px;padding:18px 20px;margin-bottom:20px;}
.main-val{font-size:42px;font-weight:800;color:#b5451b;line-height:1}
.main-unit{font-size:16px;font-weight:600;color:#b5451b;opacity:.75}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px}
.footer{border-top:1px solid #eceff1;padding-top:16px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;align-items:center}
.footer a{color:#b5451b;font-size:13px;font-weight:600;text-decoration:none}
.footer a:hover{text-decoration:underline}
.date{font-size:12px;color:#90a4ae}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="../index.html">← Все новости</a>
  <div class="card">
    <div class="header">
      <div class="cat-badge">Промышленность</div>
      <h1 class="headline">РЕСПУБЛИКИ УЗБЕКИСТАН ПО СТАТИСТИКЕ</h1>
      <div class='period'>июня 2026</div>
    </div>
    <div class="body">
      
      <div class="stats-grid"></div>
      
      <div class="footer">
        <a href="https://stat.uz/ru/press-tsentr/novosti-goskomstata/68823-ajsi-ududda-yangi-korkhona-va-tashkilotlar-k-pro-tashkil-etilmo-da-3" target="_blank">Источник: stat.uz →</a>
        <span class="date"></span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
