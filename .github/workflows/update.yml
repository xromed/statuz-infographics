name: Update Uzbekistan Statistics

on:
  schedule:
    - cron: '0 */3 * * *'   # каждые 3 часа
  workflow_dispatch:          # кнопка ручного запуска в GitHub

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Rebuild all pages (new design)
        run: python scripts/rebuild_pages.py

      - name: Run updater
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python scripts/main.py

      - name: Commit and push changes
        run: |
          git config user.name "StatBot"
          git config user.email "bot@statuz.pages"
          git add -A
          git diff --staged --quiet || git commit -m "Update: $(date '+%Y-%m-%d %H:%M')"
          for i in 1 2 3 4 5; do
            git push && break
            echo "Push rejected, retrying with rebase ($i)..."
            git fetch origin main
            git rebase origin/main
            sleep 3
          done
